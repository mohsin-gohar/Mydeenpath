<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DeenPath</title>
    <link rel="icon" type="image/png" href="pics/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0a2f1d;
            --gold: #d4af37;
            --gold-light: #f0d78c;
            --white: #ffffff;
            --off-white: #f8f5f0;
            --text-dark: #1a1a2e;
            --text-light: #6b6b7a;
            --shadow: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-gold: 0 8px 30px rgba(212, 175, 55, 0.3);
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary), #0a3a22);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1, h2 { font-family: 'Playfair Display', serif; font-weight: 700; }

        .register-container {
            max-width: 480px; width: 100%;
            background: var(--white); border-radius: var(--radius);
            padding: 40px; box-shadow: var(--shadow);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .register-container .logo {
            text-align: center; margin-bottom: 30px;
        }
        .register-container .logo img {
            width: 70px; height: 70px; border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 12px;
        }
        .register-container .logo h2 {
            color: var(--gold); font-size: 2rem;
        }
        .register-container .logo p {
            color: var(--text-light); font-size: 0.95rem;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            font-weight: 600; color: var(--text-dark);
            display: block; margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 0.95rem; transition: var(--transition);
            background: var(--off-white);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--gold); outline: none;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .form-group select { appearance: none; cursor: pointer; }

        .password-group { position: relative; }
        .password-group .toggle {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: var(--text-light);
        }

        .checkbox-group {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px; font-size: 0.9rem;
        }
        .checkbox-group input { width: auto; }
        .checkbox-group a { color: var(--gold); text-decoration: none; }
        .checkbox-group a:hover { text-decoration: underline; }

        .btn-register {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--primary); border: none; border-radius: 12px;
            font-weight: 600; font-size: 1.1rem; cursor: pointer;
            transition: var(--transition); box-shadow: var(--shadow-gold);
        }
        .btn-register:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(212,175,55,0.4); }

        .login-link {
            text-align: center; margin-top: 16px;
            color: var(--text-light); font-size: 0.95rem;
        }
        .login-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }

        .error-msg {
            background: #fee; color: #c0392b;
            padding: 12px; border-radius: 12px;
            margin-bottom: 16px; display: none;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .register-container { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <img src="pics/logo.jpg" alt="DeenPath">
            <h2>DeenPath</h2>
            <p>Create your account today</p>
        </div>

        <div class="error-msg" id="errorMsg">Please fill in all required fields.</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-group">
                    <input type="password" id="regPassword" placeholder="Min 8 characters" required>
                    <span class="toggle" onclick="togglePassword('regPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-group">
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    <span class="toggle" onclick="togglePassword('regConfirmPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            <div class="form-group">
                <label>Country</label>
                <select id="regCountry">
                    <option value="">Select your country</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="India">India</option>
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="UAE">UAE</option>
                    <option value="UK">United Kingdom</option>
                    <option value="USA">United States</option>
                    <option value="Canada">Canada</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="privacy.html">Terms & Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            const field = document.getElementById(id);
            const icon = field.nextElementSibling.querySelector('i');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const country = document.getElementById('regCountry').value;
            const terms = document.getElementById('terms').checked;

            if (!name || !email || !password || !confirm || !country) {
                document.getElementById('errorMsg').textContent = 'Please fill in all fields.';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            if (password !== confirm) {
                document.getElementById('errorMsg').textContent = 'Passwords do not match.';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            if (password.length < 8) {
                document.getElementById('errorMsg').textContent = 'Password must be at least 8 characters.';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            if (!terms) {
                document.getElementById('errorMsg').textContent = 'Please accept the terms and conditions.';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            // Save user data
            const users = JSON.parse(localStorage.getItem('deenpathUsers') || '[]');
            users.push({ name, email, country, registered: new Date().toISOString() });
            localStorage.setItem('deenpathUsers', JSON.stringify(users));
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);

            alert('Registration successful! Welcome to DeenPath.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
