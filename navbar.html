<head>

    <style>
/* ========================================
   NAVBAR STYLES
   ======================================== */
.navbar {
    background: rgba(9, 47, 29, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 10px 0;
    transition: all 0.4s ease;
    border-bottom: 1px solid rgba(212, 175, 55, 0.15);
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
}

.navbar.scrolled {
    padding: 6px 0;
    background: rgba(9, 47, 29, 0.98);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}

.navbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0;
}

.navbar-logo {
    height: 45px;
    width: 45px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid rgba(212, 175, 55, 0.3);
}

.navbar-brand-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
}

.navbar-brand-text span {
    color: #d4af37;
}

.navbar-nav .nav-link {
    color: rgba(255, 255, 255, 0.8) !important;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 50px;
    transition: all 0.3s ease;
    position: relative;
    font-size: 0.95rem;
}

.navbar-nav .nav-link::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: #d4af37;
    transition: width 0.3s ease;
}

.navbar-nav .nav-link:hover::after,
.navbar-nav .nav-link.active::after {
    width: 50%;
}

.navbar-nav .nav-link:hover,
.navbar-nav .nav-link.active {
    color: #d4af37 !important;
}

.navbar-nav .nav-link.active {
    background: rgba(212, 175, 55, 0.15);
}

.navbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: 20px;
}

.search-toggle {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.8);
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
    transition: all 0.3s ease;
}

.search-toggle:hover {
    color: #d4af37;
}

/* Dark Mode Toggle */
.dark-mode-toggle {
    position: relative;
}

.dark-mode-toggle .toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.8);
    position: relative;
    padding: 4px 8px;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.08);
    transition: all 0.3s ease;
}

.dark-mode-toggle .toggle-label .toggle-ball {
    display: none;
}

.dark-mode-toggle input {
    display: none;
}

/* Dropdown */
.dropdown-menu {
    background: rgba(9, 47, 29, 0.98);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212, 175, 55, 0.15);
    border-radius: 12px;
    padding: 8px;
    min-width: 220px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
}

.dropdown-item {
    color: rgba(255, 255, 255, 0.8);
    padding: 10px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 0.95rem;
}

.dropdown-item:hover {
    background: rgba(212, 175, 55, 0.15);
    color: #d4af37;
}

/* Search Overlay */
.search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(9, 47, 29, 0.97);
    backdrop-filter: blur(20px);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
}

.search-overlay.active {
    display: flex;
}

.search-overlay-content {
    width: 90%;
    max-width: 600px;
    position: relative;
}

.search-close {
    position: absolute;
    top: -60px;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.search-close:hover {
    transform: rotate(90deg);
}

.search-wrapper {
    position: relative;
    margin-bottom: 20px;
}

.search-wrapper .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #d4af37;
    font-size: 18px;
}

.search-wrapper input {
    width: 100%;
    padding: 16px 20px 16px 56px;
    border: 2px solid rgba(212, 175, 55, 0.3);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

.search-wrapper input:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
}

.search-wrapper input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

.search-results {
    max-height: 400px;
    overflow-y: auto;
    display: none;
}

.search-results.active {
    display: block;
}

.search-result-item {
    display: block;
    padding: 12px 18px;
    color: rgba(255, 255, 255, 0.8);
    border-radius: 8px;
    transition: all 0.3s ease;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.search-result-item:hover {
    background: rgba(212, 175, 55, 0.15);
    color: #d4af37;
}

/* Responsive */
@media (max-width: 991px) {
    .navbar-actions {
        margin-left: 0;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        justify-content: center;
        flex-wrap: wrap;
    }
    
    .navbar-nav .nav-link::after {
        display: none;
    }
}

@media (max-width: 575px) {
    .navbar-brand-text {
        font-size: 1.2rem;
    }
    
    .navbar-logo {
        height: 35px;
        width: 35px;
    }
}
</style>
</head>
